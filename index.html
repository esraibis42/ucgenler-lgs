<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Üçgenler Geometri Dünyası</title>
    
    <style>
        /* GEOMETRİK VE CANLI TASARIM (CSS) */
        :root {
            --ana-renk: #6c5ce7;
            --ikincil: #a29bfe;
            --arka-plan: #f1f2f6;
            --dogru: #00b894;
            --yanlis: #ff7675;
            --altin: #fdcb6e;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--arka-plan);
            background-image: linear-gradient(#d1d1d1 1px, transparent 1px), linear-gradient(90deg, #d1d1d1 1px, transparent 1px);
            background-size: 30px 30px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container { 
            width: 90%; 
            max-width: 700px; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 40px; 
            border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(108, 92, 231, 0.2);
            border: 4px solid var(--ana-renk);
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .container::before {
            content: "";
            position: absolute;
            top: -50px;
            right: -50px;
            width: 100px;
            height: 100px;
            background: var(--altin);
            transform: rotate(45deg);
        }

        h1 { 
            color: var(--ana-renk); 
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px #eee;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .topic-btn {
            padding: 20px;
            border: 3px solid var(--ikincil);
            border-radius: 20px;
            background: white;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--ana-renk);
            box-shadow: 0 5px 0 var(--ikincil);
        }

        .topic-btn:hover { 
            background: var(--ana-renk); 
            color: white; 
            transform: translateY(-5px);
            box-shadow: 0 10px 0 #4834d4;
        }

        .option-btn { 
            display: block; 
            width: 100%; 
            padding: 18px; 
            margin: 12px 0; 
            border: 2px solid #dfe6e9; 
            border-radius: 15px; 
            cursor: pointer; 
            font-size: 17px;
            font-weight: 600;
            background: #fff;
            transition: 0.3s;
        }

        .option-btn:hover { 
            border-color: var(--ana-renk);
            background: #f9f8ff;
        }

        .hidden { display: none; }

        #image-container img {
            max-width: 100%;
            height: auto;
            border: 5px solid #eee;
            border-radius: 20px;
            margin: 20px 0;
            background: white;
        }

        #hint-text {
            background: #fff9e6;
            padding: 10px;
            border-left: 5px solid var(--altin);
            margin: 15px 0;
            font-style: italic;
            border-radius: 5px;
        }

        /* --- BİLGİ KÖŞESİ VE KATLAMA ANİMASYONU --- */
        .animation-box {
            height: 250px;
            background: #f9f9f9;
            border-radius: 20px;
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 20px;
            perspective: 1000px;
        }

        .triangle-paper {
            width: 0;
            height: 0;
            border-left: 100px solid transparent;
            border-right: 100px solid transparent;
            border-bottom: 170px solid var(--ikincil);
            position: relative;
            transition: 1s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: center bottom;
        }

        .fold-line {
            position: absolute;
            width: 2px;
            background: var(--yanlis);
            left: -1px;
            bottom: 0;
            height: 0;
            transition: 0.5s ease 1s;
        }

        .folding { transform: rotateY(180deg) scaleX(0.2); }
    </style>
</head>
<body>

    <div class="container">
        <div id="menu-area">
            <h1>△ Geometri Kampı</h1>
            <p>LGS Üçgenler Ünitesini Fethetmeye Hazır Mısın?</p>
            
            <div class="menu-grid">
                <button class="topic-btn" onclick="startQuiz('yardimci')">📏 Yardımcı Elemanlar</button>
                <button class="topic-btn" onclick="startQuiz('esitsizlik')">📐 Üçgen Eşitsizliği</button>
                <button class="topic-btn" onclick="startQuiz('aci-kenar')">💡 Açı-Kenar İlişkisi</button>
                <button class="topic-btn" onclick="startQuiz('pisagor')">⚓ Pisagor Bağıntısı</button>
                <button class="topic-btn" onclick="openInfo()" style="grid-column: span 2; background: var(--altin); color: #2d3436;">📖 Bilgi Köşesi (İnteraktif Katlama)</button>
            </div>
        </div>

        <div id="quiz-area" class="hidden">
            <div id="image-container"></div>
            <h3 id="question-text">Soru Hazırlanıyor...</h3>
            <div id="options-container"></div>
            <p id="hint-text" class="hidden"></p>
            <button id="next-btn" class="hidden" style="background:var(--dogru); color:white; padding:15px 40px; border:none; border-radius:50px; cursor:pointer; font-weight:bold;">Sonraki Soru ➔</button>
            <div style="margin-top: 30px;">
                <button onclick="location.reload()" style="color:#b2bec3; background:none; border:none; cursor:pointer; font-weight:bold;">✖ Menüye Dön</button>
            </div>
        </div>

        <div id="info-area" class="hidden">
            <h2 style="color: var(--ana-renk);">Kağıt Katlama Simülasyonu</h2>
            <div class="animation-box">
                <div id="paper-triangle" class="triangle-paper">
                    <div id="fold-line" class="fold-line"></div>
                </div>
            </div>
            <div id="info-desc" style="margin-bottom: 20px; font-weight: bold; color: var(--ana-renk); min-height: 1.5em;">Butonlara basarak katlamayı izle!</div>
            <div class="menu-grid">
                <button class="option-btn" onclick="animateFold('yukseklik')">Yükseklik Oluştur</button>
                <button class="option-btn" onclick="animateFold('aciortay')">Açıortay Oluştur</button>
                <button class="option-btn" onclick="animateFold('kenarortay')">Kenarortay Oluştur</button>
            </div>
            <br>
            <button onclick="location.reload()" style="background:none; border:none; color:var(--ana-renk); cursor:pointer; font-weight:bold; font-size: 16px;">⬅ Ana Menüye Dön</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
