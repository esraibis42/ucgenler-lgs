<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Üçgenler Geometri Dünyası | LGS Hazırlık</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div id="menu-area">
            <div style="text-align: center; margin-bottom: 30px;">
                <span style="background: var(--altin); color: #2d3436; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 14px;">M.8.3.1. Üçgenler</span>
                <h1 style="margin-top: 15px;">△ Geometri Kampı</h1>
                <p>LGS Üçgenler Ünitesini İnteraktif Şekilde Fethet!</p>
            </div>
            
            <div class="menu-grid">
                <button class="topic-btn" onclick="startQuiz('yardimci')">
                    <span style="display: block; font-size: 24px; margin-bottom: 10px;">📏</span>
                    Yardımcı Elemanlar
                </button>
                <button class="topic-btn" onclick="startQuiz('esitsizlik')">
                    <span style="display: block; font-size: 24px; margin-bottom: 10px;">📐</span>
                    Üçgen Eşitsizliği
                </button>
                <button class="topic-btn" onclick="startQuiz('aci-kenar')">
                    <span style="display: block; font-size: 24px; margin-bottom: 10px;">💡</span>
                    Açı-Kenar İlişkisi
                </button>
                <button class="topic-btn" onclick="startQuiz('pisagor')">
                    <span style="display: block; font-size: 24px; margin-bottom: 10px;">⚓</span>
                    Pisagor Bağıntısı
                </button>
                
                <button class="topic-btn" onclick="openInfo()" style="grid-column: span 2; background: var(--altin); border-color: #f1c40f; color: #2d3436; margin-top: 10px;">
                    📖 Bilgi Köşesi: İnteraktif Katlama Uygulaması
                </button>
            </div>

            <footer style="margin-top: 40px; font-size: 12px; color: #b2bec3;">
                Matematik Öğretmeni Adayı Esra tarafından geliştirilmiştir.
            </footer>
        </div>

        <div id="quiz-area" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <span id="kazanim-tag" style="font-size: 12px; color: var(--primary); font-weight: bold;"></span>
                <button onclick="location.reload()" style="background: none; border: 1px solid #ddd; padding: 5px 10px; border-radius: 10px; cursor: pointer;">✖ Kapat</button>
            </div>

            <div id="question-container">
                <div id="image-container">
                    </div>
                <h3 id="question-text" style="margin: 20px 0; line-height: 1.5;">Soru Yükleniyor...</h3>
                <div id="options-container">
                    </div>
            </div>
            
            <p id="hint-text" class="hidden"></p>
            
            <button id="next-btn" class="hidden" style="background: var(--success); color: white; width: 100%; padding: 18px; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 5px 15px rgba(0, 184, 148, 0.3);">
                Tebrikler! Sonraki Soruya Geç ➔
            </button>
        </div>

        <div id="info-area" class="hidden">
            <h2 style="color: var(--primary); margin-bottom: 5px;">📐 İnteraktif Katlama Köşesi</h2>
            <p style="font-size: 14px; color: #636e72; margin-bottom: 20px;">Üçgeni katlayarak yardımcı elemanları keşfet.</p>
            
            <div style="background: white; border-radius: 20px; padding: 10px; box-shadow: inset 0 0 10px rgba(0,0,0,0.05);">
                <svg id="svg-folding-area" viewBox="0 0 200 250"></svg>
            </div>
            
            <div id="info-desc">Uygulamayı başlatmak için bir eleman seçin.</div>
            
            <div class="menu-grid" style="margin-top: 20px;">
                <button class="option-btn" onclick="animateFold('yukseklik')">
                    <strong>Yükseklik</strong><br><small>(Diklik Oluşturur)</small>
                </button>
                <button class="option-btn" onclick="animateFold('aciortay')">
                    <strong>Açıortay</strong><br><small>(Açıyı Böler)</small>
                </button>
                <button class="option-btn" onclick="animateFold('kenarortay')">
                    <strong>Kenarortay</strong><br><small>(Kenarı Böler)</small>
                </button>
            </div>
            
            <button onclick="location.reload()" style="margin-top: 30px; background: none; border: none; color: var(--primary); font-weight: bold; cursor: pointer; font-size: 16px; text-decoration: underline;">
                ⬅ Ana Menüye Dön
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
