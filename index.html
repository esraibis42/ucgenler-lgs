<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Üçgenler Geometri Dünyası</title>
    
    <style>
        /* GEOMETRİK VE CANLI TASARIM (CSS) */
        :root {
            --ana-renk: #6c5ce7;
            --ikincil: #a29bfe;
            --arka-plan: #f1f2f6;
            --dogru: #00b894;
            --yanlis: #ff7675;
            --altin: #fdcb6e;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Arka plana geometrik kareli defter dokusu ekliyoruz */
            background-color: var(--arka-plan);
            background-image: linear-gradient(#d1d1d1 1px, transparent 1px), linear-gradient(90deg, #d1d1d1 1px, transparent 1px);
            background-size: 30px 30px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container { 
            width: 90%; 
            max-width: 700px; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 40px; 
            border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(108, 92, 231, 0.2);
            border: 4px solid var(--ana-renk);
            position: relative;
            overflow: hidden;
        }

        /* Köşeye dekoratif bir üçgen ekleyelim */
        .container::before {
            content: "";
            position: absolute;
            top: -50px;
            right: -50px;
            width: 100px;
            height: 100px;
            background: var(--altin);
            transform: rotate(45deg);
        }

        h1 { 
            color: var(--ana-renk); 
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px #eee;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .topic-btn {
            padding: 20px;
            border: 3px solid var(--ikincil);
            border-radius: 20px;
            background: white;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--ana-renk);
            box-shadow: 0 5px 0 var(--ikincil);
        }

        .topic-btn:hover { 
            background: var(--ana-renk); 
            color: white; 
            transform: translateY(-5px);
            box-shadow: 0 10px 0 #4834d4;
        }

        .option-btn { 
            display: block; 
            width: 100%; 
            padding: 18px; 
            margin: 12px 0; 
            border: 2px solid #dfe6e9; 
            border-radius: 15px; 
            cursor: pointer; 
            font-size: 17px;
            font-weight: 600;
            background: #fff;
            transition: 0.3s;
        }

        .option-btn:hover { 
            border-color: var(--ana-renk);
            background: #f9f8ff;
        }

        #next-btn {
            background: var(--dogru);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 184, 148, 0.4);
            margin-top: 20px;
        }

        .hidden { display: none; }

        #image-container img {
            border: 5px solid #eee;
            border-radius: 20px;
            margin: 20px 0;
            background: white;
        }

        #hint-text {
            background: #fff9e6;
            padding: 10px;
            border-left: 5px solid var(--altin);
            margin: 15px 0;
            font-style: italic;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="menu-area">
            <h1>△ Geometri Kampı</h1>
            <p>LGS Üçgenler Ünitesini Fethetmeye Hazır Mısın?</p>
            
            <div class="menu-grid">
                <button class="topic-btn" onclick="startQuiz('yardimci')">📏 Yardımcı Elemanlar</button>
                <button class="topic-btn" onclick="startQuiz('esitsizlik')">📐 Üçgen Eşitsizliği</button>
                <button class="topic-btn" onclick="startQuiz('aci-kenar')">💡 Açı-Kenar İlişkisi</button>
                <button class="topic-btn" onclick="startQuiz('pisagor')">⚓ Pisagor Bağıntısı</button>
            </div>
        </div>

        <div id="quiz-area" class="hidden">
            <div id="progress-container" style="color:var(--ana-renk); font-weight:bold; margin-bottom:10px;"></div>
            <div id="question-container">
                <div id="image-container"></div>
                <h3 id="question-text">Soru Hazırlanıyor...</h3>
                <div id="options-container"></div>
            </div>
            
            <p id="hint-text" class="hidden"></p>
            
            <button id="next-btn" class="hidden">Sonraki Soru ➔</button>
            
            <div style="margin-top: 30px;">
                <button onclick="location.reload()" style="color:#b2bec3; background:none; border:none; cursor:pointer; font-weight:bold;">✖ Çalışmayı Durdur ve Menüye Dön</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
